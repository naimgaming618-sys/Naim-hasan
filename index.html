 <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF প্যানেল ডিজাইন</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-panel">
        <div class="header">
            <h2>FREE FIRE <span class="highlight">PANEL V1</span></h2>
            <p>স্ট্যাটাস: <span class="status">অনলাইন</span></p>
        </div>

        <div class="menu-items">
            <div class="item">
                <span>অটো হেডশট (Auto Headshot)</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="item">
                <span>অ্যান্টেনা ভিউ (Antenna View)</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="item">
                <span>স্পিড হ্যাক (Speed Hack)</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <button class="inject-btn">ইনজেক্ট করুন (Inject)</button>
    </div>

</body>
</html>
